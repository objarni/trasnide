<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Träsnide 2025 och framåt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Träsnide 2025 och framåt</h1>
        <p>En serie föremål jag täljt/byggt under och efter <a href="https://www.sv.se/avdelningar/sv-goteborg/kategorier/talja-i-tra-helgkurser">
        träsnideskurs</a></p>
    </header>

    <main class="timeline" id="timeline"></main>

    <h2 class="future-title">Framtida projekt</h2>
    <div class="future-list" id="futureList"></div>

    <div class="modal-overlay" id="overlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="closeBtn">&times;</button>
            <img id="modalImg" src="" alt="">
            <div class="modal-body">
                <div class="modal-date" id="modalDate"></div>
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
            </div>
        </div>
    </div>

    <script src="texts.js"></script>
    <script src="future-items.js"></script>
    <script>
        const timeline = document.getElementById('timeline');

        items.forEach(item => {
            const article = document.createElement('article');
            article.className = 'timeline-item';

            article.innerHTML = `
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <div class="timeline-month">${item.month}</div>
                    <div class="timeline-name">${item.name}</div>
                    <p class="timeline-desc">${item.description}</p>
                    <div class="timeline-img-wrapper" data-index="${item.number - 1}">
                        <img src="bilder/${item.number}.jpg" alt="${item.name}">
                    </div>
                </div>
            `;

            timeline.appendChild(article);
        });

        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const modalDate = document.getElementById('modalDate');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const closeBtn = document.getElementById('closeBtn');

        function openModal(index) {
            const item = items[index];
            if (!item) return;
            modalImg.src = `bilder/${item.number}.jpg`;
            modalImg.alt = item.name;
            modalDate.textContent = item.month;
            modalTitle.textContent = item.name;
            modalDesc.textContent = item.description;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        timeline.addEventListener('click', (e) => {
            const wrapper = e.target.closest('.timeline-img-wrapper');
            if (wrapper) {
                openModal(parseInt(wrapper.dataset.index, 10));
            }
        });

        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        const futureList = document.getElementById('futureList');

        futureProjects.forEach(title => {
            const div = document.createElement('div');
            div.className = 'future-item';
            div.textContent = title;
            futureList.appendChild(div);
        });
    </script>

</body>
</html>
