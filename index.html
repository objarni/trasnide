<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Träsnide 2025 och framåt</title>
    <style>
        :root {
            --bg: #faf7f2;
            --text: #2c2420;
            --accent: #8b6f47;
            --card-bg: #ffffff;
            --muted: #8a7e74;
            --line: #d4c5b2;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 3rem 1.5rem 2rem;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        header p {
            color: var(--muted);
            margin-top: 0.5rem;
            font-size: 1.05rem;
        }

        .timeline {
            max-width: 720px;
            margin: 0 auto;
            padding: 1rem 1.5rem 4rem;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 32px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--line);
        }

        .timeline-item {
            display: flex;
            gap: 2rem;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .timeline-dot {
            flex-shrink: 0;
            width: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .timeline-dot::after {
            content: '';
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            border: 3px solid var(--bg);
            box-shadow: 0 0 0 2px var(--accent);
            margin-top: 0.75rem;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-month {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
            margin-bottom: 0.35rem;
        }

        .timeline-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .timeline-desc {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.7;
        }

        .timeline-img-wrapper {
            cursor: pointer;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(44, 36, 32, 0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .timeline-img-wrapper:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(44, 36, 32, 0.14);
        }

        .timeline-img-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(30, 24, 20, 0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            padding: 2rem;
            cursor: pointer;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 14px;
            max-width: 640px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(30, 24, 20, 0.3);
            animation: modalIn 0.25s ease;
            cursor: default;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        .modal-body {
            padding: 1.75rem 2rem 2rem;
        }

        .modal-date {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .modal-desc {
            color: var(--muted);
            line-height: 1.75;
            font-size: 0.95rem;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.85);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .modal-close:hover {
            background: #fff;
        }

        @media (max-width: 520px) {
            .timeline::before {
                left: 20px;
            }

            .timeline-dot {
                width: 40px;
            }

            .timeline-item {
                gap: 1rem;
            }

            header h1 {
                font-size: 1.6rem;
            }

            .modal {
                margin: 1rem;
            }

            .modal-body {
                padding: 1.25rem 1.5rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Träsnide 2025 och framåt</h1>
        <p>En serie föremål jag täljt/byggt under och efter <a href="https://www.sv.se/avdelningar/sv-goteborg/kategorier/talja-i-tra-helgkurser">
        träsnideskurs</a></p>
    </header>

    <main class="timeline" id="timeline"></main>

    <div class="modal-overlay" id="overlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="closeBtn">&times;</button>
            <img id="modalImg" src="" alt="">
            <div class="modal-body">
                <div class="modal-date" id="modalDate"></div>
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
            </div>
        </div>
    </div>

    <script src="texts.js"></script>
    <script>
        const timeline = document.getElementById('timeline');

        items.forEach(item => {
            const article = document.createElement('article');
            article.className = 'timeline-item';

            article.innerHTML = `
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                    <div class="timeline-month">${item.month}</div>
                    <div class="timeline-name">${item.name}</div>
                    <p class="timeline-desc">${item.description}</p>
                    <div class="timeline-img-wrapper" data-index="${item.number - 1}">
                        <img src="bilder/${item.number}.jpg" alt="${item.name}">
                    </div>
                </div>
            `;

            timeline.appendChild(article);
        });

        const overlay = document.getElementById('overlay');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const modalDate = document.getElementById('modalDate');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const closeBtn = document.getElementById('closeBtn');

        function openModal(index) {
            const item = items[index];
            if (!item) return;
            modalImg.src = `bilder/${item.number}.jpg`;
            modalImg.alt = item.name;
            modalDate.textContent = item.month;
            modalTitle.textContent = item.name;
            modalDesc.textContent = item.description;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        timeline.addEventListener('click', (e) => {
            const wrapper = e.target.closest('.timeline-img-wrapper');
            if (wrapper) {
                openModal(parseInt(wrapper.dataset.index, 10));
            }
        });

        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>

</body>
</html>
